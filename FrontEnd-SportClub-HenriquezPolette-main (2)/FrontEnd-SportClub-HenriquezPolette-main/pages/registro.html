<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - SportClub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body class="form-page">
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h1>SportClub</h1>
                <p>Únete a nuestra comunidad</p>
            </div>

            <form class="registro-form" id="registroForm">
                <div class="form-group">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre" required>
                    <span class="error-message" id="nombreError"></span>
                </div>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar Contraseña</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required>
                    <span class="error-message" id="confirmPasswordError"></span>
                </div>

                <div class="form-group">
                    <label for="deporte">Deporte Favorito (Opcional)</label>
                    <select id="deporte" name="deporte">
                        <option value="">Selecciona un deporte</option>
                        <option value="futbol">Fútbol</option>
                        <option value="tenis">Tenis</option>
                        <option value="natacion">Natación</option>
                        <option value="crossfit">Crossfit</option>
                        <option value="yoga">Yoga</option>
                        <option value="otro">Otro</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
                </div>

                <div class="success-message" id="successMessage"></div>
            </form>

            <div class="form-links">
                <a href="login.html" class="link">← Iniciar Sesion</a>
            </div>

            <div class="form-footer">
                <a href="../index.html" class="link">Ir al inicio</a>
            </div>
        </div>
    </div>

    <script src="../js/forms.js"></script>
</body>
</html>
