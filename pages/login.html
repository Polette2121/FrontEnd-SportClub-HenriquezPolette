<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SportClub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body class="form-page">
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h1>SportClub</h1>
                <p>Tu mejor versión comienza hoy</p>
            </div>

            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                    <span class="error-message" id="passwordError"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">Ingresar</button>
                </div>

                <div class="form-links">
                    <a href="recuperar-contrasena.html" class="link">¿Olvidaste tu contraseña?</a>
                    <span class="divider">|</span>
                    <a href="registro.html" class="link">Crear cuenta</a>
                </div>

                <div class="success-message" id="successMessage"></div>
            </form>

            <!-- ACCESOS RÁPIDOS -->
            <div class="quick-access">
                <p>Accesos rápidos para revisar el sistema:</p>
                <div class="quick-buttons">
                    <a href="dashboard-coach.html" class="btn btn-small btn-secondary">Coach</a>
                    <a href="dashboard-admin.html" class="btn btn-small btn-secondary">Admin</a>
                </div>
            </div>

            <div class="form-footer">
                <a href="../index.html" class="link">← Volver al inicio</a>
            </div>
        </div>
    </div>

    <script src="../js/forms.js"></script>
</body>
</html>
