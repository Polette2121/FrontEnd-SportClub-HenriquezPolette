<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - SportClub</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/forms.css">
</head>
<body class="form-page">
    <div class="form-container">
        <div class="form-card">
            <div class="form-header">
                <h1>SportClub</h1>
                <p>Recuperar Contraseña</p>
            </div>

            <form class="recuperar-form" id="recuperarForm">
                <p class="form-description">Ingresa tu correo electrónico y te enviaremos un enlace para recuperar tu contraseña.</p>

                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="tu@correo.com" required>
                    <span class="error-message" id="emailError"></span>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-block">Enviar Enlace</button>
                </div>

                <div class="success-message" id="successMessage"></div>
            </form>

            <div class="form-links">
                <a href="login.html" class="link">← Volver al Login</a>
            </div>

            <div class="form-footer">
                <a href="../index.html" class="link">Ir al inicio</a>
            </div>
        </div>
    </div>

    <script src="../js/forms.js"></script>
</body>
</html>
